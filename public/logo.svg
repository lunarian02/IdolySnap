<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Pastel gradient for IDOLY -->
    <linearGradient id="idolyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA7C4"/>
      <stop offset="35%" style="stop-color:#E8A0D0"/>
      <stop offset="65%" style="stop-color:#C4A8E8"/>
      <stop offset="100%" style="stop-color:#A8C8F0"/>
    </linearGradient>
    
    <!-- Gradient for SNAP -->
    <linearGradient id="snapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4A8E8"/>
      <stop offset="50%" style="stop-color:#F5A0C0"/>
      <stop offset="100%" style="stop-color:#FFB8D0"/>
    </linearGradient>
    
    <!-- Sparkle gradient -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD0E8"/>
      <stop offset="100%" style="stop-color:#D0C0F0"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#E8A0D0" flood-opacity="0.35"/>
    </filter>

    <!-- Sparkle glow -->
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background sparkles / decorations -->
  <!-- Top left star -->
  <g filter="url(#sparkleGlow)" opacity="0.7">
    <path d="M95 65 L98 55 L101 65 L111 68 L101 71 L98 81 L95 71 L85 68Z" fill="url(#sparkleGrad)"/>
  </g>
  <!-- Top right star -->
  <g filter="url(#sparkleGlow)" opacity="0.6">
    <path d="M700 50 L703 38 L706 50 L718 53 L706 56 L703 68 L700 56 L688 53Z" fill="#FFD0E8"/>
  </g>
  <!-- Small dot accents -->
  <circle cx="130" cy="95" r="3" fill="#E8C0F0" opacity="0.6"/>
  <circle cx="670" cy="85" r="2.5" fill="#FFC0D8" opacity="0.5"/>
  <circle cx="155" cy="220" r="2" fill="#C8D0F8" opacity="0.5"/>
  <circle cx="650" cy="210" r="3" fill="#F0C0E0" opacity="0.4"/>
  
  <!-- Small sparkle bottom left -->
  <g filter="url(#sparkleGlow)" opacity="0.5">
    <path d="M120 200 L122 194 L124 200 L130 202 L124 204 L122 210 L120 204 L114 202Z" fill="#C8B8F0"/>
  </g>
  <!-- Small sparkle bottom right -->
  <g filter="url(#sparkleGlow)" opacity="0.45">
    <path d="M685 190 L687 185 L689 190 L694 192 L689 194 L687 199 L685 194 L680 192Z" fill="#FFB8D0"/>
  </g>

  <!-- Main text: IDOLY -->
  <text x="400" y="155" text-anchor="middle" font-family="'Fredoka', 'Nunito', 'Quicksand', sans-serif" font-size="120" font-weight="700" letter-spacing="8" filter="url(#textShadow)">
    <tspan fill="url(#idolyGrad)">IDOLY</tspan>
  </text>
  
  <!-- Outline stroke for depth -->
  <text x="400" y="155" text-anchor="middle" font-family="'Fredoka', 'Nunito', 'Quicksand', sans-serif" font-size="120" font-weight="700" letter-spacing="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.3">
    IDOLY
  </text>

  <!-- Sub text: SNAP -->
  <text x="400" y="230" text-anchor="middle" font-family="'Fredoka', 'Nunito', 'Quicksand', sans-serif" font-size="68" font-weight="600" letter-spacing="22" filter="url(#textShadow)">
    <tspan fill="url(#snapGrad)">SNAP</tspan>
  </text>

  <!-- Decorative line between -->
  <line x1="270" y1="175" x2="530" y2="175" stroke="url(#sparkleGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Small heart accent near the line -->
  <g transform="translate(400, 175) scale(0.5)" opacity="0.5">
    <path d="M0 -5 C-3 -10, -10 -10, -10 -5 C-10 0, 0 8, 0 8 C0 8, 10 0, 10 -5 C10 -10, 3 -10, 0 -5Z" fill="#F5A0C0"/>
  </g>
</svg>
